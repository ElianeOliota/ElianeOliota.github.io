<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Block COVID</title>
  <link rel="shortcut icon" href="/img/favico.png" type="image/png">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/materialize/0.97.6/css/materialize.min.css'>


  <link rel="stylesheet" href="/src/css/style.css">
  <script src="/src/js/jquery.js"></script>

</head>

<body>


  <div id="preloader">
    <div class="inner">
      <!-- HTML DA ANIMAÇÃO -->
      <div class="bolas">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <span id="txt_preloader">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Aguarde </span><br>
      <span id="txt_preloader">Carregando APP !... </span>
    </div>
  </div>
  <!-- fim do preloader -->


  <div id="total_main">
    <div id="logo"></div>
    <div id="login-page" class="row">
      <div class="col s12 z-depth-6 card-panel">
        <form class="login-form">
          <div class="row">
          </div>
          <div class="row">
            <div class="input-field col s12">
              <i class="material-icons prefix">mail_outline</i>
              <input class="validate" id="email" type="email">
              <label for="email" data-error="Informe um e-mail válido" data-success="E-mail válido">Email</label>
            </div>
            <div class="row">
              <div class="input-field col s12">
                <i class="material-icons prefix">lock_outline</i>
                <input id="password" type="password">
                <label for="password">Senha</label>
              </div>
            </div>
            <div class="row">
              <div class="col-12 center">

                <button type="button" id="login" class="btn btn-info form-control">Entrar</button>
                <br>
                <br>
                <a href="/src/registrar.html">Realizar cadastro</a>
              </div>
              <div class="input-field col s12">
              </div>
            </div>
          </div>
        </form>

      </div>

    </div>

  </div>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/materialize/0.97.6/js/materialize.min.js'></script>

  <script src="/src/js/login.js"></script>

</body>

</html>
