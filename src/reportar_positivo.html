<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Block COVID</title>
  <link rel="shortcut icon" href="/img/favico.png" type="image/png">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
    integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
    crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
    integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
    crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/src/estilo_compartilhado.css">
 
</head>


<body>
  <div class="container-fluid"> 
    <nav class="navbar navbar-expand-lg text-light navbar-light bg-light  transparente">
     
    </nav>

  <br><br>
  <div class="container-fluid">

    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h3>
              <img src="/img/reportar_positivo.png" class="rounded-circle" width="32px">
              Reportar caso positivo
            </h3>
          </div>
          <div class="card-body">

            <form id="formulario">
              <div class="row">

                <div class="col-4">

                  <div class="card">
                    <div class="card-header">
                      <h4>
                        Formulário
                      </h4>
                    </div>
                    <div class="card-body">
                      <div class="row">
                        <div class="col">
                          <label for="data">Data do teste</label>
                          <input type="date" class="form-control" id="data" placeholder="Data do teste" required>

                        </div>
                        <div class="col">
                          <label for="dias">Monitorar por:</label>
                          <input type="number" class="form-control" id="dias" min="5" required
                            placeholder="Quantidade de dias">
                        </div>
                      </div>

                      <br><br>
                      <div class="row">
                        <div class="col"></div>
                        <button type="button" id="cancelar" class="btn btn-danger form-control col-3">Cancelar</button>
                        <button type="submit" class="btn btn-primary form-control col-3">Enviar</button>

                        <div class="col"></div>
                      </div>
                    </div>
                    <div class="card-footer">

                      Ao reportar o caso positivo, a localização será compartilhada de forma anônima, por alguns dias.
                      Durante esse
                      período os
                      outros usuários receberão alertas para evitar aproximação.

                    </div>
                  </div>
                </div>

                <div class="col">
                  <div class="card">
                    <div class="card-body">
                      <iframe width="100%" height="370px"
                        src="https://maps.google.com/maps?q=proway&t=&z=21&ie=UTF8&iwloc=&output=embed" frameborder="0"
                        style="border:0" allowfullscreen></iframe>
                    </div>
                  </div>

                </div>
              </div>
            </form>



          </div>

        </div>
      </div>
    </div>

  </div>
  </div>

  <div class="footer bg-light">

    <img src="/img/logo_login.png" height="70px"> 
    <br>
    <b>Desenvolvido por : Equipe parque spitzkopf</b>
 
   </div>
   <script src="/src/menu.js"></script>
  <script src="/src/seguranca.js"></script>
  <script>
    $("#formulario").on(         //para o elemento com ID 'formulario'
      'submit',                  //no evento de submit disparado pelo button com type submit
      (e) => {                   //faça o que estiver nessa função (e) é o parametro de evento
        e.preventDefault();      //removendo caracteristica padrão do submit que é dar um refresh em tela
        alert("Caso positivo, reportado. Obrigado por contribuir") // mensagem em tela para o usuário
        window.history.go(-1);   //comando para voltar a página anterior
        return false;
      }
    );

    $("#cancelar").on(          //para o elemento com ID 'cancelar'
      "click",                  //no evento de click
      () => {                     //faça o que estiver nessa função
        window.history.go(-1);  //retornar a página anterior
        return false;
      }
    )
  </script>


</body>

</html>
